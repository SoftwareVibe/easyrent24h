# Redirect 301 dalla struttura WordPress al clone Laravel+Vue.
# Da includere nel server block di nginx in produzione.
# NOTA pre-cutover: esportare l'elenco completo delle URL indicizzate dalle
# sitemap Yoast del sito vivo (sitemap_index.xml) e integrare la mappa.

# Archivio catalogo WordPress -> catalogo SPA (pickup id legacy -> query nuova)
location = /catalog/ { return 301 /catalog$is_args$args; }
location ~ ^/catalog/page/\d+/?$ { return 301 /catalog; }

# Tipo veicolo (taxonomy vehicle_type, base "type")
location ~ ^/type/scooters?/?$ { return 301 /catalog?type=scooters; }
location ~ ^/type/cars?/?$ { return 301 /catalog?type=cars; }

# Lingue WPML a prefisso -> parametro lang
location ~ ^/it(/.*)?$ { return 301 $1?lang=it; }
location ~ ^/es(/.*)?$ { return 301 $1?lang=es; }

# Pagine istituzionali (verificare gli slug reali dalle sitemap prima del go-live)
location = /about-us/ { return 301 /about; }
location = /chi-siamo/ { return 301 /about?lang=it; }
location = /contact/ { return 301 /contact; }
location = /contatti/ { return 301 /contact?lang=it; }

# Dettaglio veicolo: su WordPress era già disabilitato (redirect alla ricerca)
location ~ ^/catalog/[^/]+/?$ { return 301 /catalog; }

# Risorse WordPress non più esistenti
location ~ ^/(wp-content|wp-includes|wp-json|wp-admin|wp-login\.php) { return 410; }
location = /feed/ { return 410; }
